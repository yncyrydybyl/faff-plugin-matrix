id = "{{instance_name}}"
plugin = "faff-plugin-matrix"

# Matrix Authentication Service (MAS) compatible. The legacy /login endpoint
# is NOT used. You must obtain (user_id, device_id, access_token) out-of-band
# — see the README for the two supported paths (mas-cli or Element session).
[connection]
homeserver   = "https://matrix.datanauten.de"
user_id      = "@yourbot:datanauten.de"
device_id    = "ABCDEFGHIJ"
# Either set access_token directly, OR set access_token_env to the name of an
# environment variable that holds it (recommended — keeps it out of dotfiles).
access_token = ""
access_token_env = "FAFF_MATRIX_TOKEN"

# Either an internal room id (!abcdef:server) or an alias (#room:server).
# The room MUST already have the bot user as a member. The bot will not auto-join.
room = "#faff-status:datanauten.de"

[options]
# Which transitions to announce: any subset of "start", "stop", "switch".
notify_on = ["start", "stop", "switch"]

# Post the current state once on startup (useful after restarts).
announce_on_startup = false

# Don't actually send to Matrix, just print what would be sent.
dry_run = false

# Templates use Python str.format syntax. Missing fields render as "".
# Available fields:
#   start  -> {alias} {role} {objective} {action} {subject} {trackers} {start_time}
#   stop   -> the above plus {duration}
#   switch -> the above plus {prev_alias} {prev_duration}
[options.templates]
start  = "[faff] started: {alias} ({start_time})"
stop   = "[faff] stopped: {alias} after {duration}"
switch = "[faff] switched: {prev_alias} -> {alias}"
